<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Google Login</title>
</head>

<body>

    <h2>Login with Google</h2>

    <!-- Google OAuth button -->
    <button id="googleButton">Sign in with Google</button>

    <script>
        const CLIENT_ID = "681899380433-bagafife6vgs85o6d7h8vm1v1d4h9d90.apps.googleusercontent.com";
        const REDIRECT_URI = "http://127.0.0.1:5500/google.html";

        document.getElementById("googleButton").addEventListener("click", () => {
            // Build the Google OAuth2 URL
            const oauth2Url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=code&scope=openid email profile&access_type=online&prompt=consent`;

            // Redirect user to Google login
            window.location.href = oauth2Url;
        });

        // After redirect back from Google, grab the `code` from URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get("code");
        console.log(code);

        if (code) {
            console.log("Google OAuth Code:", code);

            // Send the code to your Django backend
            fetch("http://127.0.0.1:8000/auth/social/google/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    code: code,
                    redirect_uri: REDIRECT_URI
                }),
            })
                .then(res => res.json())
                .then(data => {
                    console.log("Backend response:", data);

                    if (!data.access) {
                        alert("Login failed: " + JSON.stringify(data));
                        return;
                    }

                    localStorage.setItem("access", data.access);
                    localStorage.setItem("refresh", data.refresh);
                    alert("Login successful!");
                })
                .catch(err => console.error("Error:", err));
        }
    </script>

</body>

</html>
